<!-- =========================
     # PROJECT STRUCTURE
=========================

ROOT
├─ index.html
│
├─ assets/
│  ├─ css/
│  │  └─ style.css
│  ├─ js/
│  │  └─ script.js
│  └─ images/
│     ├─ logo.png
│     └─ main-visual.png
│
├─ content/
│  └─ game-images/
│     ├─ thumb/
│     └─ detail/
│
├─ data/
│  ├─ raw/
│  │  ├─ boardgames_ranks.csv
│  │  └─ cottage-owned-games.tsv
│  │
│  ├─ cache/
│  │  ├─ bgg-match-result.json
│  │  └─ bgg-details-cache.json
│  │
│  └─ output/
│     ├─ cottage-games-data.js
│     └─ cottage-games-data.json
│
└─ tools/
   ├─ convert-bgg.js
   ├─ normalize-game-name.js
   ├─ match-owned-games-to-bgg.js
   ├─ fetch-bgg-details.js
   └─ build-cottage-game-data.js

========================= -->


<!-- =========================
역할 색인


index.html
→ 홈페이지 구조

assets/css/style.css
→ 전체 디자인

assets/js/script.js
→ 화면 동작 / 추천 UI / 카드 렌더링

assets/images/
→ 로고, 메인 비주얼 같은 사이트 공통 이미지

content/game-images/thumb/
→ 게임 카드용 작은 이미지

content/game-images/detail/
→ 게임 상세 바텀시트용 큰 이미지

data/raw/
→ 원본 데이터 보관소
→ 직접 수정하는 원본 파일

data/cache/
→ 자동 처리 중간 결과
→ 매칭 결과 / BGG API 캐시

data/output/
→ 홈페이지가 실제 사용하는 최종 데이터

tools/
→ 데이터 변환용 개발 도구


normalize-game-name.js
→ 게임명 정규화 담당
→ 한글/영문/기호/확장명/괄호 제거
→ "스플렌더 포켓몬" 같은 이름을 비교 가능한 형태로 바꿈

match-owned-games-to-bgg.js
→ 네 보유게임 리스트와 BGG 랭킹 CSV 매칭
→ 보유게임명 → BGG id 찾기
→ 자동 매칭 / 애매한 매칭 / 실패 목록 분리

fetch-bgg-details.js
→ BGG API 상세정보 수집
→ BGG id를 기준으로 weight, 인원, 이미지, 설명, 메커니즘 수집
→ data/cache/bgg-details-cache.json 저장

build-cottage-game-data.js
→ 최종 홈페이지용 데이터 생성
→ 네 보유게임 리스트 + BGG 상세정보 + 코티지 큐레이션 문구 병합
→ data/output/cottage-games-data.js 생성
→ data/output/cottage-games-data.json도 같이 생성

convert-bgg.js
→ 전체 실행 파일
→ 위 4개를 순서대로 호출하는 메인 스크립트





========================= -->

 <button
