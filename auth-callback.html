<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인 처리 중...</title>
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; background: #faf9f5; color: #555; }
  </style>
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <p>로그인 처리 중...</p>
  <script>
    (async function () {
      const queryParams = new URLSearchParams(window.location.search);
      const returnUrl = sessionStorage.getItem('kakao_login_return') || '/index.html';
      sessionStorage.removeItem('kakao_login_return');

      const code = queryParams.get('code');

      if (code) {
        // Kakao SDK v2: authorize()로 받은 code를 REST API로 교환
        try {
          const res = await fetch('https://kauth.kakao.com/oauth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=utf-8' },
            body: new URLSearchParams({
              grant_type: 'authorization_code',
              client_id: '0e496d427628f9f9b239b106cb5313fa',
              redirect_uri: window.location.origin + '/auth-callback.html',
              code: code,
            }),
          });
          const tokenData = await res.json();
          const accessToken = tokenData.access_token;

          if (!accessToken) {
            console.error('kakao token error', tokenData);
            document.querySelector('p').textContent = '로그인 오류: ' + (tokenData.error_description || tokenData.error || '알 수 없음');
            return;
          }
          const userRes = await fetch('https://kapi.kakao.com/v2/user/me', {
            headers: { 'Authorization': 'Bearer ' + accessToken },
          });
          const data = await userRes.json();
          const profile = data.kakao_account?.profile || {};
          const userId = String(data.id);
          const customNick = localStorage.getItem(`cottage_custom_nick_${userId}`);
          const customPhoto = localStorage.getItem(`cottage_custom_photo_${userId}`);
          const user = {
            id: userId,
            nickname: customNick || profile.nickname || '손님',
            profileImage: customPhoto || profile.profile_image_url || '',
            kakaoProfileImage: profile.profile_image_url || '',
          };
          localStorage.setItem('kakao_user', JSON.stringify(user));
        } catch (e) {
          console.error('kakao auth error', e);
          document.querySelector('p').textContent = '로그인 오류 (네트워크): ' + e.message;
          return;
        }
      }

      window.location.replace(returnUrl);
    })();
  </script>
</body>
</html>
