<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전체 게임 보기 | 코티지보드</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body class="owned-page">
  <header class="site-header">

    <a class="header-logo" href="./index.html">
      <img src="./assets/images/main/logo.png" alt="코티지보드 로고">
    </a>

    <a class="header-center" href="./index.html">
      오래 머무르고 싶은, 보드게임 공간
    </a>

    <div class="header-actions">

      <button
        class="header-search"
        id="headerSearchButton"
        type="button"
        aria-label="게임 검색 열기"
      >
        🔍
      </button>

      <button
        class="menu-toggle"
        id="menuToggle"
        type="button"
        aria-label="메뉴 열기"
      >
        ☰
      </button>

    </div>

    <nav class="header-menu" id="mobileMenu">
      <a href="./index.html#recommend">추천 게임 찾기</a>
      <a href="./owned-games.html">전체 게임 보기</a>
      <a href="./store-usage-guide.html">매장 이용 안내</a>
      <a href="./contact.html">문의하기</a>
    </nav>

    <div class="header-search-panel" id="headerSearchPanel">
      <input
        id="headerSearchInput"
        type="search"
        placeholder="게임명을 입력하세요"
      >

      <div
        class="header-search-results"
        id="headerSearchResults"
      ></div>
    </div>

  </header>

  <main>
    <section class="owned-games-page">
      <h1>전체 게임 보기</h1>

      <div class="owned-search-box">
  <input
    id="ownedSearchInput"
    type="search"
    placeholder="게임명을 검색하세요"
  >
</div>

      <div class="owned-toolbar">
        <div class="owned-sort-grid">

          <p class="owned-control-title">정렬</p>

          <div class="owned-sort-item">
            <span>이름</span>
            <select id="sortTitle">
              <option value="asc">오름차순</option>
              <option value="desc">내림차순</option>
              <option value="none">사용 안함</option>
            </select>
          </div>

          <div class="owned-sort-item">
            <span>난이도</span>
            <select id="sortWeight">
              <option value="none">사용 안함</option>
              <option value="asc">낮은순</option>
              <option value="desc">높은순</option>
            </select>
          </div>

          <div class="owned-sort-item">
            <span>평점</span>
            <select id="sortRating">
              <option value="none">사용 안함</option>
              <option value="asc">낮은순</option>
              <option value="desc">높은순</option>
            </select>
          </div>

          <div class="owned-control-divider"></div>

          <p class="owned-control-title">필터</p>

          <div class="owned-sort-item">
            <span>체감 난이도</span>
            <select id="ownedDifficultyFilter">
              <option value="">전체</option>
              <option value="kids">아이도 가능</option>
              <option value="beginner">입문 추천</option>
              <option value="light">라이트·패밀리</option>
              <option value="heavy">헤비·매니아</option>
              <option value="hardcore">하드코어</option>
            </select>
          </div>

          <div class="owned-sort-item">
            <span>메커니즘</span>
            <select id="ownedMechanicFilter">
              <option value="">전체</option>
            </select>
          </div>

        </div>
      </div>

      <div id="ownedGameList"></div>

      <div class="owned-pagination" id="ownedPagination"></div>
    </section>
  </main>

  <div class="game-sheet" id="gameSheet">
    <div class="game-sheet-dim" id="closeGameSheetDim"></div>

    <div class="game-sheet-panel">
      <button class="game-sheet-close" id="closeGameSheetButton" type="button">
        ✕
      </button>

      <div id="gameSheetContent"></div>
    </div>
  </div>

  <script src="./game-system/game-data/generated/maps/bgg-tag-translations.js"></script>
  <script src="./game-system/game-data/library/games/cottage-games-data.js"></script>
  <script src="./assets/js/view/game-view-utils.js"></script>
  <script src="./assets/js/script.js"></script>
</body>
</html>
