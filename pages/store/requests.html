        <!-- 탭2: 간식·음료 요청 -->

  <script>
  (function() {
    // 탭 전환
    document.querySelectorAll('.req-tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.req-tab-btn').forEach(b => b.classList.remove('is-active'));
        document.querySelectorAll('.req-tab-panel').forEach(p => p.classList.remove('is-active'));
        btn.classList.add('is-active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('is-active');
      });
    });

    function getDb() {
      return window.CottageDB ? window.supabase?.createClient?.(
        window.SUPABASE_CONFIG?.url, window.SUPABASE_CONFIG?.anonKey
      ) : null;
    }

    // ── 게임 요청 ────────────────────────────────────────
    async function loadGameRequests() {
      const el = document.getElementById('gameRequestList');
      if (!window.SUPABASE_CONFIG?.url || window.SUPABASE_CONFIG?.url === 'YOUR_SUPABASE_URL') {
        el.innerHTML = '<div class="req-list-empty">준비 중이에요.</div>';
        return;
      }
      const db = window.supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.anonKey);
      const { data, error } = await db
        .from('game_requests')
        .select('game_name, request_count')
        .order('request_count', { ascending: false })
        .limit(50);
      if (error || !data?.length) {
        el.innerHTML = '<div class="req-list-empty">아직 요청이 없어요. 첫 번째로 요청해보세요!</div>';
        return;
      }
      el.innerHTML = '<ul class="req-list">' +
        data.map(r => `<li class="req-list-item">
          <span class="req-list-name">${escHtml(r.game_name)}</span>
          <span class="req-list-count">${r.request_count}명 희망</span>
        </li>`).join('') +
        '</ul>';
    }

    document.getElementById('gameRequestBtn').addEventListener('click', async () => {
      const input = document.getElementById('gameRequestInput');
      const name = input.value.trim();
      if (!name) { input.focus(); return; }
      if (!window.SUPABASE_CONFIG?.url || window.SUPABASE_CONFIG?.url === 'YOUR_SUPABASE_URL') return;
      const db = window.supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.anonKey);
      const btn = document.getElementById('gameRequestBtn');
      btn.disabled = true;
      // 기존 항목 조회
      const { data: existing } = await db
        .from('game_requests')
        .select('id, request_count')
        .ilike('game_name', name)
        .maybeSingle();
      if (existing) {
        await db.from('game_requests').update({ request_count: existing.request_count + 1 }).eq('id', existing.id);
      } else {
        await db.from('game_requests').insert({ game_name: name, request_count: 1, status: 'pending' });
      }
      input.value = '';
      btn.disabled = false;
      const msg = document.getElementById('gameSuccessMsg');
      msg.textContent = `"${name}" 요청이 전달됐어요!`;
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 3000);
      await loadGameRequests();
    });

    document.getElementById('gameRequestInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('gameRequestBtn').click();
    });

    // ── 간식·음료 요청 ────────────────────────────────────
    async function loadSnackRequests() {
      const el = document.getElementById('snackRequestList');
      if (!window.SUPABASE_CONFIG?.url || window.SUPABASE_CONFIG?.url === 'YOUR_SUPABASE_URL') {
        el.innerHTML = '<div class="req-list-empty">준비 중이에요.</div>';
        return;
      }
      const db = window.supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.anonKey);
      const { data, error } = await db
        .from('snack_requests')
        .select('item_name, request_count')
        .order('request_count', { ascending: false })
        .limit(50);
      if (error || !data?.length) {
        el.innerHTML = '<div class="req-list-empty">아직 요청이 없어요. 원하는 간식을 알려주세요!</div>';
        return;
      }
      el.innerHTML = '<ul class="req-list">' +
        data.map(r => `<li class="req-list-item">
          <span class="req-list-name">${escHtml(r.item_name)}</span>
          <span class="req-list-count">${r.request_count}명 희망</span>
        </li>`).join('') +
        '</ul>';
    }

    document.getElementById('snackRequestBtn').addEventListener('click', async () => {
      const input = document.getElementById('snackRequestInput');
      const name = input.value.trim();
      if (!name) { input.focus(); return; }
      if (!window.SUPABASE_CONFIG?.url || window.SUPABASE_CONFIG?.url === 'YOUR_SUPABASE_URL') return;
      const db = window.supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.anonKey);
      const btn = document.getElementById('snackRequestBtn');
      btn.disabled = true;
      const { data: existing } = await db
        .from('snack_requests')
        .select('id, request_count')
        .ilike('item_name', name)
        .maybeSingle();
      if (existing) {
        await db.from('snack_requests').update({ request_count: existing.request_count + 1 }).eq('id', existing.id);
      } else {
        await db.from('snack_requests').insert({ item_name: name, request_count: 1 });
      }
      input.value = '';
      btn.disabled = false;
      const msg = document.getElementById('snackSuccessMsg');
      msg.textContent = `"${name}" 요청이 전달됐어요!`;
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 3000);
      await loadSnackRequests();
    });

    document.getElementById('snackRequestInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('snackRequestBtn').click();
    });

    // ── 개선 건의 ─────────────────────────────────────────
    document.getElementById('suggestBtn').addEventListener('click', async () => {
      const input = document.getElementById('suggestInput');
      const content = input.value.trim();
      if (!content) { input.focus(); return; }
      if (!window.SUPABASE_CONFIG?.url || window.SUPABASE_CONFIG?.url === 'YOUR_SUPABASE_URL') return;
      const db = window.supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.anonKey);
      const btn = document.getElementById('suggestBtn');
      btn.disabled = true;
      await db.from('suggestions').insert({ content });
      input.value = '';
      btn.disabled = false;
      const msg = document.getElementById('suggestSuccessMsg');
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 4000);
    });

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // 초기 로드
    loadGameRequests();
    loadSnackRequests();
  })();
  </script>
