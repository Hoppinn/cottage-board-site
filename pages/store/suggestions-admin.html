  <script>
  (function () {
    function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    async function loadSuggestions() {
      const el = document.getElementById('mainContent');

      if (!window.isOwner?.()) {
        el.innerHTML = '<div class="admin-gate">관리자만 볼 수 있는 페이지예요.</div>';
        return;
      }

      const cfg = window.SUPABASE_CONFIG;
      if (!cfg || !window.supabase) { el.innerHTML = '<div class="suggest-empty">DB 연결 실패</div>'; return; }
      const db = window.supabase.createClient(cfg.url, cfg.anonKey);

      const { data, error } = await db.from('suggestions').select('id, content, user_id, created_at').order('created_at', { ascending: false });

      if (error || !data?.length) {
        el.innerHTML = '<div class="suggest-empty">' + (error ? '불러오기 실패' : '아직 건의사항이 없어요.') + '</div>';
        return;
      }

      el.innerHTML = `<div class="suggest-list">${data.map(s => `
        <div class="suggest-item" data-id="${s.id}">
          <div class="suggest-content">${escH(s.content)}</div>
          <div class="suggest-meta">
            <span>${formatDate(s.created_at)}</span>
            <button class="suggest-del" type="button">삭제</button>
          </div>
        </div>`).join('')}</div>`;

      el.querySelectorAll('.suggest-del').forEach(btn => {
        btn.addEventListener('click', async () => {
          const item = btn.closest('.suggest-item');
          const id = item.dataset.id;
          if (!confirm('삭제할까요?')) return;
          await db.from('suggestions').delete().eq('id', id);
          item.remove();
        });
      });
    }

    // 카카오 로그인 완료 후 로드
    let tried = false;
    function tryLoad() {
      if (tried) return;
      tried = true;
      loadSuggestions();
    }
    window.addEventListener('kakao-auth-ready', tryLoad);
    setTimeout(tryLoad, 1200);
  })();
  </script>
