  <script>
  (function () {
    // game_id → 표시 이름 매핑
    function getGameName(gameId) {
      if (!window.COTTAGE_GAMES) return gameId;
      const g = window.COTTAGE_GAMES.find(g => String(g.bggId) === String(gameId));
      return g ? (g.display || g.titleKo || g.titleEn || gameId) : gameId;
    }

    // KST 날짜 문자열 (YYYY-MM-DD)
    function toKstDate(isoStr) {
      const d = new Date(new Date(isoStr).getTime() + 9 * 3600000);
      return d.toISOString().slice(0, 10);
    }

    // YYYY-MM-DD → 읽기 좋은 형태
    function formatKstDate(dateStr) {
      const [y, m, d] = dateStr.split('-');
      return `${y}년 ${Number(m)}월 ${Number(d)}일`;
    }

    // 인스타 캡션 생성
    function buildCaption(groupName, dateStr, records) {
      const dateLabel = formatKstDate(dateStr);
      const lines = records.map(r => {
        const name = getGameName(r.game_id);
        const tags = [
          r.player_count ? `${r.player_count}명` : null,
          r.player_names || null,
          r.play_time_min ? `${r.play_time_min}분` : null,
          r.score_note || null,
        ].filter(Boolean);
        return `- ${name}${tags.length ? ' · ' + tags.join(' · ') : ''}`;
      });
      return `🎲 ${groupName} (${dateLabel})\n${lines.join('\n')}\n\n#코티지보드 #보드게임`;
    }

    async function render() {
      const root = document.getElementById('historyRoot');
      if (!window.CottageDB) {
        root.innerHTML = '<p class="history-empty">데이터를 불러올 수 없습니다.</p>';
        return;
      }

      const records = await window.CottageDB.getAllPlayRecordsForHistory();

      const tipHtml = `<div class="history-tip">💡 <span><a href="./game-reviews.html" style="color:inherit;text-decoration:underline">플레이 기록</a> 시 <strong>"모임 기록으로 남기기"</strong>를 체크하면 여기에 기록돼요</span></div>`;

      if (!records.length) {
        root.innerHTML = tipHtml + '<p class="history-empty">아직 모임 기록이 없습니다.</p>';
        return;
      }

      // group_name → date → records[]
      const grouped = {};
      for (const r of records) {
        const g = r.group_name;
        const d = r.played_at || toKstDate(r.created_at);
        if (!grouped[g]) grouped[g] = {};
        if (!grouped[g][d]) grouped[g][d] = [];
        grouped[g][d].push(r);
      }

      let html = tipHtml;
      for (const [groupName, dates] of Object.entries(grouped)) {
        const totalSessions = Object.keys(dates).length;
        html += `<div class="history-group" data-history-group="${escAttr(groupName)}">
          <div class="history-group-header">
            <span class="history-group-name">${escH(groupName)}</span>
            <span class="history-group-count">${totalSessions}회</span>
          </div>`;

        for (const [dateStr, recs] of Object.entries(dates).sort((a, b) => b[0].localeCompare(a[0]))) {
          const captionAttr = escAttr(buildCaption(groupName, dateStr, recs));
          html += `<div class="history-session">
            <div class="history-session-header">
              <span class="history-session-date">${formatKstDate(dateStr)}</span>
              <button class="history-copy-btn" data-caption="${captionAttr}" type="button">캡션 복사</button>
            </div>
            <div class="history-record-list">
              ${recs.map(r => {
                const name = getGameName(r.game_id);
                const tags = [
                  r.player_count ? `👥 ${r.player_count}명` : null,
                  r.player_names ? `🎮 ${escH(r.player_names)}` : null,
                  r.play_time_min ? `⏱ ${r.play_time_min}분` : null,
                  r.score_note ? `🏆 ${escH(r.score_note)}` : null,
                ].filter(Boolean);
                return `<div class="history-record-item">
                  <a class="history-game-name" href="../owned-games.html?open=${encodeURIComponent(r.game_id)}">${escH(name)}</a>
                  ${tags.length ? `<div class="history-record-tags">${tags.map(t => `<span class="history-tag">${t}</span>`).join('')}</div>` : ''}
                  ${r.photo_url ? `<img class="history-photo" src="${escAttr(r.photo_url)}" alt="사진" loading="lazy">` : ''}
                </div>`;
              }).join('')}
            </div>
          </div>`;
        }

        html += `</div>`;
      }

      root.innerHTML = html;

      // ?group= 파라미터로 특정 그룹 섹션 스크롤
      const groupParam = new URLSearchParams(location.search).get('group');
      if (groupParam) {
        const el = root.querySelector(`[data-history-group="${CSS.escape(groupParam)}"]`);
        if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
      }

      root.querySelectorAll('.history-copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const caption = btn.dataset.caption;
          navigator.clipboard.writeText(caption).then(() => {
            btn.textContent = '복사됨!';
            btn.classList.add('is-copied');
            setTimeout(() => {
              btn.textContent = '캡션 복사';
              btn.classList.remove('is-copied');
            }, 2000);
          }).catch(() => {
            prompt('아래 텍스트를 복사해주세요', caption);
          });
        });
      });
    }

    function escH(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escAttr(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    }

    document.addEventListener('DOMContentLoaded', render);
  })();
  </script>
