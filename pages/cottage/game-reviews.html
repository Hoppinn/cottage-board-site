<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>플레이 기록 | 코티지보드</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
  <style>
    /* tabs */
    .pr-tabs { display: flex; border-bottom: 2px solid var(--border,#e8e4dc); margin-bottom: 20px; }
    .pr-tab { flex: 1; padding: 10px 4px; font-size: 14px; font-weight: 700; color: var(--muted); background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; margin-bottom: -2px; }
    .pr-tab.is-active { color: var(--green); border-bottom-color: var(--green); }
    .pr-panel { display: none; }
    .pr-panel.is-active { display: block; }

    /* input form */
    .pr-field-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; display: block; }
    .pr-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .pr-meta-grid input { border: 1px solid var(--border,#e8e4dc); border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit; background: var(--card-bg,#fff); width: 100%; box-sizing: border-box; }
    .pr-add-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; background: var(--green); color: #fff; border: none; border-radius: 8px; padding: 9px 14px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 12px; }
    .pr-add-btn:hover { opacity: 0.85; }
    .pr-game-rows { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .pr-game-row { background: var(--card-bg,#fff); border: 1px solid var(--border,#e8e4dc); border-radius: 10px; padding: 12px; }
    .pr-row-head { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .pr-row-head input { flex: 1; border: 1px solid var(--border,#e8e4dc); border-radius: 7px; padding: 7px 10px; font-size: 14px; font-family: inherit; background: var(--bg,#f5f0e8); }
    .pr-rm-btn { background: none; border: none; font-size: 18px; color: var(--muted); cursor: pointer; padding: 2px 6px; flex-shrink: 0; }
    .pr-rm-btn:hover { color: #c0392b; }
    .pr-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .pr-detail-grid input { border: 1px solid var(--border,#e8e4dc); border-radius: 7px; padding: 7px 10px; font-size: 13px; font-family: inherit; background: var(--bg,#f5f0e8); width: 100%; box-sizing: border-box; }
    .pr-review-ta { width: 100%; box-sizing: border-box; border: 1px solid var(--border,#e8e4dc); border-radius: 7px; padding: 7px 10px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 52px; margin-top: 6px; background: var(--bg,#f5f0e8); }
    .pr-submit-btn { width: 100%; background: var(--green); color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .pr-submit-btn:disabled { opacity: 0.5; }
    .pr-login-notice { text-align: center; padding: 36px 0; color: var(--muted); font-size: 14px; }

    /* session accordion (기록 보기) */
    .pr-session { border: 1px solid var(--border,#e8e4dc); border-radius: 12px; margin-bottom: 10px; overflow: hidden; background: var(--card-bg,#fff); }
    .pr-session-hd {
      width: 100%; display: flex; align-items: center; gap: 8px;
      padding: 13px 14px; background: none; border: none; cursor: pointer;
      text-align: left; font-family: inherit;
    }
    .pr-session-hd:hover { background: var(--bg,#f5f0e8); }
    .pr-session-date { font-size: 14px; font-weight: 700; color: var(--text); flex-shrink: 0; }
    .pr-session-group { font-size: 12px; background: var(--green); color: #fff; border-radius: 20px; padding: 1px 9px; flex-shrink: 0; }
    .pr-session-summary { font-size: 12px; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pr-session-arrow { font-size: 14px; color: var(--muted); flex-shrink: 0; transition: transform 0.2s; margin-left: auto; }
    .pr-session.is-open .pr-session-arrow { transform: rotate(180deg); }
    .pr-session-body { display: none; border-top: 1px solid var(--border,#e8e4dc); }
    .pr-session.is-open .pr-session-body { display: block; }

    .pr-rec-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border,#e8e4dc); }
    .pr-rec-row:last-child { border-bottom: none; }
    .pr-rec-main { flex: 1; min-width: 0; }
    .pr-rec-game { font-size: 14px; font-weight: 700; color: var(--green); margin-bottom: 5px; }
    .pr-rec-meta { display: flex; flex-wrap: wrap; gap: 4px; }
    .pr-rec-tag { font-size: 12px; background: var(--bg,#f5f0e8); border-radius: 5px; padding: 2px 7px; color: var(--text,#333); }
    .pr-rec-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; margin-top: 2px; }
    .pr-rec-review-link { font-size: 12px; color: var(--muted); text-decoration: none; border: 1px solid var(--border,#e8e4dc); border-radius: 5px; padding: 2px 7px; white-space: nowrap; }
    .pr-rec-review-link:hover { color: var(--green); border-color: var(--green); }
    .pr-rec-del { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; padding: 2px 5px; }
    .pr-rec-del:hover { color: #c0392b; }

    /* single game view (from bottom sheet ?game=) */
    .rv-item { background: var(--card-bg,#fff); border: 1px solid var(--border,#e8e4dc); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
    .rv-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .rv-game { font-size: 12px; font-weight: 700; color: var(--green); }
    .rv-nick { font-size: 13px; font-weight: 700; color: var(--text); }
    .rv-date { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .rv-content { font-size: 14px; line-height: 1.6; color: var(--text); white-space: pre-wrap; }
    .rv-del { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; padding: 2px 6px; margin-left: 6px; }
    .rv-del:hover { color: #c0392b; }

    .rv-write-box { background: var(--card-bg,#fff); border: 1px solid var(--border,#e8e4dc); border-radius: 12px; padding: 14px; margin-bottom: 20px; }
    .rv-write-box textarea { width: 100%; box-sizing: border-box; border: 1px solid var(--border,#e8e4dc); border-radius: 8px; padding: 10px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 80px; }
    .rv-write-actions { display: flex; justify-content: flex-end; margin-top: 8px; }
    .rv-submit-btn { background: var(--green); color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .rv-submit-btn:disabled { opacity: 0.5; }
    .rv-game-title { font-size: 18px; font-weight: 900; color: var(--green); margin: 0 0 4px; }
    .rv-section-title { font-size: 14px; font-weight: 700; color: var(--muted); margin: 0 0 12px; }

    /* toast */
    .pr-toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--green); color: #fff; border-radius: 22px; padding: 10px 24px; font-size: 14px; font-weight: 700; z-index: 9999; opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap; }
    .pr-toast.show { opacity: 1; }

    .pr-empty { text-align: center; color: var(--muted); font-size: 14px; padding: 36px 0; }

    /* game name autocomplete */
    .pr-autocomplete-wrap { position: relative; flex: 1; }
    .pr-autocomplete-list { position: absolute; top: calc(100% + 3px); left: 0; right: 0; background: var(--card-bg,#fff); border: 1px solid var(--border,#e8e4dc); border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); z-index: 200; max-height: 200px; overflow-y: auto; display: none; }
    .pr-autocomplete-list.is-open { display: block; }
    .pr-autocomplete-item { padding: 9px 12px; font-size: 14px; cursor: pointer; color: var(--text); border-bottom: 1px solid var(--border,#e8e4dc); }
    .pr-autocomplete-item:last-child { border-bottom: none; }
    .pr-autocomplete-item:hover, .pr-autocomplete-item.is-focused { background: var(--bg,#f5f0e8); }

    /* player count toggles */
    .pr-count-toggles { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
    .pr-count-btn { border: 1px solid var(--border,#e8e4dc); background: var(--card-bg,#fff); border-radius: 6px; padding: 5px 9px; font-size: 12px; cursor: pointer; font-family: inherit; color: var(--text); line-height: 1; }
    .pr-count-btn.is-on { background: var(--green); color: #fff; border-color: var(--green); }

    /* photo upload */
    .pr-photo-trigger { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); cursor: pointer; border: 1px dashed var(--border,#e8e4dc); border-radius: 7px; padding: 6px 10px; margin-top: 6px; box-sizing: border-box; }
    .pr-photo-preview { max-width: 100%; max-height: 100px; border-radius: 7px; margin-top: 6px; display: none; }

    /* photo thumbnail in record row */
    .pr-rec-photo { width: 72px; height: 54px; object-fit: cover; border-radius: 7px; flex-shrink: 0; }

    /* view toggle (모임별 / 게임별) */
    .pr-view-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
    .pr-vt-btn { flex: 1; padding: 8px; font-size: 13px; font-weight: 700; border: 1px solid var(--border,#e8e4dc); border-radius: 8px; background: var(--card-bg,#fff); color: var(--muted); cursor: pointer; font-family: inherit; }
    .pr-vt-btn.is-active { background: var(--green); color: #fff; border-color: var(--green); }

    /* sub-session (날짜 단위, 모임별 뷰 안) */
    .pr-sub-session { border-top: 1px solid var(--border,#e8e4dc); }
    .pr-sub-hd { width: 100%; display: flex; align-items: center; gap: 8px; padding: 9px 14px 9px 22px; background: none; border: none; cursor: pointer; text-align: left; font-family: inherit; }
    .pr-sub-hd:hover { background: rgba(0,0,0,0.03); }
    .pr-sub-date { font-size: 13px; font-weight: 700; color: var(--text); flex-shrink: 0; }
    .pr-sub-summary { font-size: 12px; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pr-sub-arrow { font-size: 13px; color: var(--muted); flex-shrink: 0; transition: transform 0.2s; margin-left: auto; }
    .pr-sub-session.is-open .pr-sub-arrow { transform: rotate(180deg); }
    .pr-sub-body { display: none; }
    .pr-sub-session.is-open .pr-sub-body { display: block; }
  </style>
</head>

  <script src="../../game-system/config/bgg-label-map.js"></script>
  <script src="../../game-system/game-data/library/3-output/cottage-games-data-output.js"></script>
  <script src="../../assets/js/game-display-adapter.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../../assets/js/supabase-config.js"></script>
  <script src="../../assets/js/supabase-client.js"></script>
  <script src="../../assets/js/script.js"></script>
  <script src="../../assets/js/kakao-auth.js"></script>

  <script>
  (function () {
    const params = new URLSearchParams(location.search);
    const GAME_ID = params.get('game') || '';

    // ── helpers ─────────────────────────────────────────────────────

    function getGameName(id) {
      if (!id) return '알 수 없는 게임';
      if (window.COTTAGE_GAMES) {
        const g = window.COTTAGE_GAMES.find(g => String(g.bggId) === String(id));
        if (g) return g.display || g.titleKo || g.titleEn || id;
      }
      return id;
    }

    function gameIdByName(name) {
      if (!window.COTTAGE_GAMES || !name) return name;
      const found = window.COTTAGE_GAMES.find(g => {
        const label = g.display || g.titleKo || g.titleEn || '';
        return label.trim() === name.trim();
      });
      return found ? String(found.bggId) : name;
    }

    function escH(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function todayKst() {
      return new Date(Date.now() + 9 * 3600000).toISOString().slice(0, 10);
    }

    function formatKstDate(d) {
      if (!d || d === '?') return d;
      const [y, m, day] = d.split('-');
      return `${y}년 ${Number(m)}월 ${Number(day)}일`;
    }

    // 한글 초성 검색 지원
    const INITIALS = 'ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ';
    function toInitials(str) {
      return [...str].map(ch => {
        const code = ch.charCodeAt(0);
        return (code >= 0xAC00 && code <= 0xD7A3)
          ? INITIALS[Math.floor((code - 0xAC00) / 28 / 21)]
          : ch;
      }).join('');
    }
    function hangulMatch(target, query) {
      const t = target.toLowerCase();
      const q = query.toLowerCase();
      if (t.includes(q)) return true;
      if (/^[ㄱ-ㅎ]+$/.test(q)) return toInitials(target).includes(q);
      return false;
    }

    function showToast(msg) {
      const t = document.getElementById('prToast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    function getDb() {
      const cfg = window.SUPABASE_CONFIG;
      return window.supabase.createClient(cfg.url, cfg.anonKey);
    }

    // ── entry point ──────────────────────────────────────────────────

    const headerEl = document.getElementById('reviewPageHeader');
    const root = document.getElementById('reviewRoot');

    let tried = false;
    function tryInit() { if (tried) return; tried = true; GAME_ID ? initGameView() : initHub(); }
    window.addEventListener('kakao-auth-ready', tryInit);
    window.addEventListener('cottage-auth-changed', () => { if (!GAME_ID) renderInputPanel(); });
    setTimeout(tryInit, 1200);

    // ══════════════════════════════════════════════════════════════
    // HUB MODE (메인 플레이 기록 허브)
    // ══════════════════════════════════════════════════════════════

    function initHub() {
      document.title = '플레이 기록 | 코티지보드';
      headerEl.innerHTML = '<h1 style="font-size:20px;font-weight:900;margin:0 0 16px">플레이 기록</h1>';

      root.innerHTML = `
        <div class="pr-tabs">
          <button class="pr-tab is-active" data-tab="input">기록 입력</button>
          <button class="pr-tab" data-tab="records">기록 보기</button>
        </div>
        <div id="prPanelInput" class="pr-panel is-active"></div>
        <div id="prPanelRecords" class="pr-panel"></div>`;

      root.querySelectorAll('.pr-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          root.querySelectorAll('.pr-tab').forEach(t => t.classList.remove('is-active'));
          root.querySelectorAll('.pr-panel').forEach(p => p.classList.remove('is-active'));
          tab.classList.add('is-active');
          document.getElementById('prPanel' + cap(tab.dataset.tab)).classList.add('is-active');
          if (tab.dataset.tab === 'records') loadRecords();
        });
      });

      renderInputPanel();
    }

    function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    // ── 기록 입력 탭 ─────────────────────────────────────────────

    async function renderInputPanel() {
      const panel = document.getElementById('prPanelInput');
      if (!panel) return;

      const user = window.getKakaoUser?.();
      if (!user) {
        panel.innerHTML = `<div class="pr-login-notice">
          <p>로그인하면 플레이 기록을 남길 수 있어요.</p>
          <button class="btn primary-btn" style="margin-top:14px;font-size:13px;padding:8px 18px;min-width:0" onclick="window.kakaoLogin?.()">카카오 로그인</button>
        </div>`;
        return;
      }

      const groups = await window.CottageDB?.getGroupNames() || [];

      panel.innerHTML = `
        <div class="pr-meta-grid">
          <div>
            <label class="pr-field-label">날짜</label>
            <input type="date" id="prDate" value="${todayKst()}">
          </div>
          <div>
            <label class="pr-field-label">그룹명 (선택)</label>
            <div class="pr-autocomplete-wrap">
              <input type="text" id="prGroup" placeholder="동호회명 등" autocomplete="off">
              <div class="pr-autocomplete-list" id="prGroupAcList"></div>
            </div>
          </div>
        </div>

        <div class="pr-game-rows" id="prGameRows"></div>
        <button class="pr-add-btn" id="prAddBtn" type="button">+ 게임 추가</button>
        <button class="pr-submit-btn" id="prSaveBtn" type="button">저장하기</button>`;

      let rowIdx = 0;

      function addRow(focusInput) {
        const div = document.createElement('div');
        div.className = 'pr-game-row';
        div.dataset.row = ++rowIdx;
        div.innerHTML = `
          <div class="pr-row-head">
            <div class="pr-autocomplete-wrap">
              <input type="text" class="prGameName" placeholder="게임명 검색" autocomplete="off">
              <div class="pr-autocomplete-list"></div>
            </div>
            <button class="pr-rm-btn" type="button" title="삭제">✕</button>
          </div>
          <div class="pr-detail-grid">
            <div>
              <label class="pr-field-label">인원수</label>
              <div class="pr-count-toggles">
                ${[1,2,3,4,5,6,7,8].map(n => `<button class="pr-count-btn" type="button" data-n="${n}">${n}명</button>`).join('')}
              </div>
            </div>
            <div>
              <label class="pr-field-label">플레이시간(분)</label>
              <input type="number" class="prTime" placeholder="–" min="1">
            </div>
            <div>
              <label class="pr-field-label">참여자</label>
              <input type="text" class="prNames" placeholder="홍길동, 이순신">
            </div>
            <div>
              <label class="pr-field-label">점수·메모</label>
              <input type="text" class="prScore" placeholder="1등: 홍길동">
            </div>
          </div>
          <label class="pr-photo-trigger">
            📷 사진 추가 (선택)
            <input type="file" class="prPhoto" accept="image/*" style="display:none">
          </label>
          <img class="pr-photo-preview">
          <textarea class="pr-review-ta prReview" placeholder="후기 (선택)" rows="2"></textarea>`;

        // autocomplete
        const nameInput = div.querySelector('.prGameName');
        const acList = div.querySelector('.pr-autocomplete-list');
        let acFocusedIdx = -1;

        function acRender(matches) {
          acList.innerHTML = '';
          acFocusedIdx = -1;
          if (!matches.length) { acList.classList.remove('is-open'); return; }
          matches.forEach(g => {
            const label = g.display || g.titleKo || g.titleEn || '';
            const item = document.createElement('div');
            item.className = 'pr-autocomplete-item';
            item.textContent = label;
            item.dataset.label = label;
            item.addEventListener('mousedown', e => { e.preventDefault(); acSelect(label); });
            acList.appendChild(item);
          });
          acList.classList.add('is-open');
        }

        function acSelect(label) {
          nameInput.value = label;
          acList.classList.remove('is-open');
          acFocusedIdx = -1;
        }

        function acUpdateFocus() {
          const items = [...acList.querySelectorAll('.pr-autocomplete-item')];
          items.forEach((item, i) => item.classList.toggle('is-focused', i === acFocusedIdx));
          if (acFocusedIdx >= 0 && items[acFocusedIdx]) items[acFocusedIdx].scrollIntoView({ block: 'nearest' });
        }

        nameInput.addEventListener('input', () => {
          const q = nameInput.value.trim();
          if (!q || !window.COTTAGE_GAMES) { acList.classList.remove('is-open'); return; }
          const matches = window.COTTAGE_GAMES
            .filter(g => hangulMatch(g.display || g.titleKo || g.titleEn || '', q))
            .slice(0, 12);
          acRender(matches);
        });

        nameInput.addEventListener('keydown', e => {
          if (!acList.classList.contains('is-open')) return;
          const items = [...acList.querySelectorAll('.pr-autocomplete-item')];
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            acFocusedIdx = Math.min(acFocusedIdx + 1, items.length - 1);
            acUpdateFocus();
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            acFocusedIdx = Math.max(acFocusedIdx - 1, 0);
            acUpdateFocus();
          } else if (e.key === 'Enter' && acFocusedIdx >= 0) {
            e.preventDefault();
            acSelect(items[acFocusedIdx].dataset.label);
          } else if (e.key === 'Escape') {
            acList.classList.remove('is-open');
            acFocusedIdx = -1;
          }
        });

        nameInput.addEventListener('blur', () => {
          setTimeout(() => acList.classList.remove('is-open'), 150);
        });

        div.querySelectorAll('.pr-count-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const wasOn = btn.classList.contains('is-on');
            div.querySelectorAll('.pr-count-btn').forEach(b => b.classList.remove('is-on'));
            if (!wasOn) btn.classList.add('is-on');
          });
        });

        const photoInput = div.querySelector('.prPhoto');
        const photoPreview = div.querySelector('.pr-photo-preview');
        photoInput.addEventListener('change', () => {
          const file = photoInput.files[0];
          if (file) {
            photoPreview.src = URL.createObjectURL(file);
            photoPreview.style.display = 'block';
          } else {
            photoPreview.style.display = 'none';
          }
        });

        div.querySelector('.pr-rm-btn').addEventListener('click', () => div.remove());
        document.getElementById('prGameRows').appendChild(div);
        if (focusInput) div.querySelector('.prGameName').focus();
      }

      // 그룹명 자동완성
      (function () {
        const gInput = document.getElementById('prGroup');
        const gList = document.getElementById('prGroupAcList');
        let gFocused = -1;

        function gRender(matches) {
          gList.innerHTML = '';
          gFocused = -1;
          if (!matches.length) { gList.classList.remove('is-open'); return; }
          matches.forEach(label => {
            const item = document.createElement('div');
            item.className = 'pr-autocomplete-item';
            item.textContent = label;
            item.addEventListener('mousedown', e => { e.preventDefault(); gInput.value = label; gList.classList.remove('is-open'); });
            gList.appendChild(item);
          });
          gList.classList.add('is-open');
        }

        function gUpdateFocus() {
          const items = [...gList.querySelectorAll('.pr-autocomplete-item')];
          items.forEach((item, i) => item.classList.toggle('is-focused', i === gFocused));
          if (gFocused >= 0 && items[gFocused]) items[gFocused].scrollIntoView({ block: 'nearest' });
        }

        gInput.addEventListener('input', () => {
          const q = gInput.value.trim();
          const matches = q
            ? groups.filter(g => hangulMatch(g, q))
            : groups.slice(0, 8);
          gRender(matches);
        });

        gInput.addEventListener('focus', () => {
          if (!gInput.value.trim()) gRender(groups.slice(0, 8));
        });

        gInput.addEventListener('keydown', e => {
          if (!gList.classList.contains('is-open')) return;
          const items = [...gList.querySelectorAll('.pr-autocomplete-item')];
          if (e.key === 'ArrowDown') { e.preventDefault(); gFocused = Math.min(gFocused + 1, items.length - 1); gUpdateFocus(); }
          else if (e.key === 'ArrowUp') { e.preventDefault(); gFocused = Math.max(gFocused - 1, 0); gUpdateFocus(); }
          else if (e.key === 'Enter' && gFocused >= 0) { e.preventDefault(); gInput.value = items[gFocused].textContent; gList.classList.remove('is-open'); }
          else if (e.key === 'Escape') { gList.classList.remove('is-open'); }
        });

        gInput.addEventListener('blur', () => {
          setTimeout(() => gList.classList.remove('is-open'), 150);
        });
      })();

      addRow(false);

      document.getElementById('prAddBtn').addEventListener('click', () => addRow(true));

      document.getElementById('prSaveBtn').addEventListener('click', async () => {
        const dateVal = document.getElementById('prDate').value || todayKst();
        const groupVal = document.getElementById('prGroup').value.trim();
        const rows = document.querySelectorAll('#prGameRows .pr-game-row');

        const entries = [];
        for (const row of rows) {
          const name = row.querySelector('.prGameName').value.trim();
          if (!name) continue;
          const activeCountBtn = row.querySelector('.pr-count-btn.is-on');
          entries.push({
            id: gameIdByName(name),
            count: activeCountBtn ? parseInt(activeCountBtn.dataset.n) : null,
            time: parseInt(row.querySelector('.prTime').value) || null,
            names: row.querySelector('.prNames').value.trim() || null,
            score: row.querySelector('.prScore').value.trim() || null,
            review: row.querySelector('.prReview').value.trim() || null,
            photoFile: row.querySelector('.prPhoto').files[0] || null,
          });
        }

        if (!entries.length) { alert('게임을 하나 이상 입력해주세요.'); return; }

        const btn = document.getElementById('prSaveBtn');
        btn.disabled = true; btn.textContent = '저장 중...';

        let ok = true;
        for (const e of entries) {
          const photoUrl = e.photoFile
            ? await window.CottageDB.uploadPlayPhoto(e.photoFile, user.id)
            : null;
          if (e.photoFile && !photoUrl) showToast('⚠️ 사진 업로드 실패 (Storage 정책 확인 필요)');
          const res = await window.CottageDB.recordGamePlay(
            e.id, e.count, e.names, e.time, e.score,
            user.nickname, user.id, groupVal || null, dateVal, photoUrl
          );
          if (res?.error) { ok = false; continue; }
          if (e.review) {
            await window.CottageDB.insertGameReview(e.id, e.review, user.nickname, user.id);
          }
        }

        btn.disabled = false; btn.textContent = '저장하기';

        if (ok) {
          showToast('저장됐어요!');
          document.getElementById('prGameRows').innerHTML = '';
          addRow(false);
          recordsLoaded = false;
          const recTab = root.querySelector('[data-tab="records"]');
          if (recTab) recTab.click();
        } else {
          alert('일부 저장에 실패했어요. 다시 시도해주세요.');
        }
      });
    }

    // ── 기록 보기 탭 ─────────────────────────────────────────────

    let recordsLoaded = false;
    let recordsData = null;
    let currentView = 'group';

    async function loadRecords() {
      if (recordsLoaded && recordsData !== null) {
        renderRecords(recordsData);
        return;
      }
      recordsLoaded = true;
      const panel = document.getElementById('prPanelRecords');
      panel.innerHTML = '<p class="pr-empty">불러오는 중...</p>';

      try {
        const { data } = await getDb().from('game_play_records')
          .select('id, game_id, user_id, nickname, player_count, player_names, play_time_min, score_note, group_name, played_at, photo_url, created_at')
          .order('played_at', { ascending: false })
          .order('created_at', { ascending: false })
          .limit(200);

        recordsData = data || [];
        renderRecords(recordsData);
      } catch (err) {
        console.error(err);
        document.getElementById('prPanelRecords').innerHTML = '<p class="pr-empty">불러오기 실패</p>';
      }
    }

    function renderRecords(data) {
      const panel = document.getElementById('prPanelRecords');
      const user = window.getKakaoUser?.();

      const toggleHtml = `<div class="pr-view-toggle">
        <button class="pr-vt-btn ${currentView === 'group' ? 'is-active' : ''}" data-view="group">모임별</button>
        <button class="pr-vt-btn ${currentView === 'game' ? 'is-active' : ''}" data-view="game">게임별</button>
      </div>`;

      if (!data?.length) {
        panel.innerHTML = toggleHtml + '<p class="pr-empty">아직 기록이 없어요.</p>';
        bindToggle(panel);
        return;
      }

      const contentHtml = currentView === 'group'
        ? renderGroupView(data, user)
        : renderGameView(data, user);

      panel.innerHTML = toggleHtml + contentHtml;
      bindToggle(panel);

      panel.querySelectorAll('.pr-session-hd').forEach(hd => {
        hd.addEventListener('click', () => hd.closest('.pr-session').classList.toggle('is-open'));
      });
      panel.querySelectorAll('.pr-sub-hd').forEach(hd => {
        hd.addEventListener('click', () => hd.closest('.pr-sub-session').classList.toggle('is-open'));
      });
      panel.querySelectorAll('.pr-rec-del').forEach(btn => {
        btn.addEventListener('click', async e => {
          e.stopPropagation();
          if (!confirm('이 기록을 삭제할까요?')) return;
          const res = await window.CottageDB?.deleteGamePlay(btn.dataset.id);
          if (!res?.error) {
            recordsData = recordsData.filter(r => String(r.id) !== String(btn.dataset.id));
            renderRecords(recordsData);
          }
        });
      });
    }

    function bindToggle(panel) {
      panel.querySelectorAll('.pr-vt-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentView = btn.dataset.view;
          renderRecords(recordsData);
        });
      });
    }

    function renderGroupView(data, user) {
      // group_name → date → records[]
      const groups = new Map();
      for (const r of data) {
        const g = r.group_name || '';
        const d = r.played_at || r.created_at?.slice(0, 10) || '?';
        if (!groups.has(g)) groups.set(g, new Map());
        const dateMap = groups.get(g);
        if (!dateMap.has(d)) dateMap.set(d, []);
        dateMap.get(d).push(r);
      }

      let html = '';
      let first = true;
      for (const [groupName, dateMap] of groups) {
        const label = groupName || '기타 기록';
        const totalGames = [...dateMap.values()].reduce((s, recs) => s + recs.length, 0);
        html += `<div class="pr-session${first ? ' is-open' : ''}">
          <button class="pr-session-hd" type="button">
            <span class="pr-session-date">${escH(label)}</span>
            <span class="pr-session-summary">${dateMap.size}회 · ${totalGames}게임</span>
            <span class="pr-session-arrow">▾</span>
          </button>
          <div class="pr-session-body">`;

        let firstDate = true;
        for (const [dateStr, recs] of dateMap) {
          const gameNames = recs.map(r => getGameName(r.game_id));
          const summaryText = gameNames.slice(0, 3).join(', ') + (gameNames.length > 3 ? ` 외 ${gameNames.length - 3}개` : '');
          html += `<div class="pr-sub-session${firstDate ? ' is-open' : ''}">
            <button class="pr-sub-hd" type="button">
              <span class="pr-sub-date">${escH(formatKstDate(dateStr))}</span>
              <span class="pr-sub-summary">${escH(summaryText)}</span>
              <span class="pr-sub-arrow">▾</span>
            </button>
            <div class="pr-sub-body">${buildSessionBody(recs, user)}</div>
          </div>`;
          firstDate = false;
        }

        html += `</div></div>`;
        first = false;
      }
      return html;
    }

    function renderGameView(data, user) {
      // game_id → records[]
      const games = new Map();
      for (const r of data) {
        if (!games.has(r.game_id)) games.set(r.game_id, []);
        games.get(r.game_id).push(r);
      }

      let html = '';
      let first = true;
      for (const [gameId, recs] of games) {
        const gameName = getGameName(gameId);
        html += `<div class="pr-session${first ? ' is-open' : ''}">
          <button class="pr-session-hd" type="button">
            <span class="pr-session-date">${escH(gameName)}</span>
            <span class="pr-session-summary">${recs.length}회 플레이</span>
            <span class="pr-session-arrow">▾</span>
          </button>
          <div class="pr-session-body">${buildGameRows(recs, user)}</div>
        </div>`;
        first = false;
      }
      return html;
    }

    function buildSessionBody(recs, user) {
      return recs.map(r => {
        const isMine = user && String(r.user_id) === String(user.id);
        const tags = [
          r.player_count ? `👥 ${r.player_count}명` : null,
          r.player_names ? r.player_names : null,
          r.play_time_min ? `⏱ ${r.play_time_min}분` : null,
          r.score_note ? `🏆 ${r.score_note}` : null,
          r.nickname ? `✏️ ${r.nickname}` : null,
        ].filter(Boolean);
        const photoHtml = r.photo_url ? `<img class="pr-rec-photo" src="${escH(r.photo_url)}" alt="사진" loading="lazy">` : '';
        const gameReviewUrl = `./game-reviews.html?game=${encodeURIComponent(r.game_id)}`;
        return `<div class="pr-rec-row" data-id="${r.id}">
          ${photoHtml}
          <div class="pr-rec-main">
            <div class="pr-rec-game">${escH(getGameName(r.game_id))}</div>
            ${tags.length ? `<div class="pr-rec-meta">${tags.map(t => `<span class="pr-rec-tag">${escH(t)}</span>`).join('')}</div>` : ''}
          </div>
          <div class="pr-rec-actions">
            <a class="pr-rec-review-link" href="${gameReviewUrl}">💬 후기</a>
            ${isMine ? `<button class="pr-rec-del" data-id="${r.id}" type="button" title="삭제">✕</button>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    function buildGameRows(recs, user) {
      return recs.map(r => {
        const isMine = user && String(r.user_id) === String(user.id);
        const date = r.played_at || r.created_at?.slice(0, 10) || '?';
        const tags = [
          formatKstDate(date),
          r.group_name ? `📌 ${r.group_name}` : null,
          r.player_count ? `👥 ${r.player_count}명` : null,
          r.player_names ? r.player_names : null,
          r.play_time_min ? `⏱ ${r.play_time_min}분` : null,
          r.score_note ? `🏆 ${r.score_note}` : null,
          r.nickname ? `✏️ ${r.nickname}` : null,
        ].filter(Boolean);
        const photoHtml = r.photo_url ? `<img class="pr-rec-photo" src="${escH(r.photo_url)}" alt="사진" loading="lazy">` : '';
        return `<div class="pr-rec-row" data-id="${r.id}">
          ${photoHtml}
          <div class="pr-rec-main">
            <div class="pr-rec-meta">${tags.map(t => `<span class="pr-rec-tag">${escH(t)}</span>`).join('')}</div>
          </div>
          <div class="pr-rec-actions">
            ${isMine ? `<button class="pr-rec-del" data-id="${r.id}" type="button" title="삭제">✕</button>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    // ══════════════════════════════════════════════════════════════
    // SINGLE GAME VIEW (바텀시트에서 ?game=<id>로 진입)
    // ══════════════════════════════════════════════════════════════

    function initGameView() {
      const name = getGameName(GAME_ID);
      document.title = `${name} 후기 | 코티지보드`;

      const bc = document.getElementById('pageBreadcrumb');
      bc.innerHTML = `게임 찾기 <span>›</span> <a href="./game-reviews.html">플레이 기록</a> <span>›</span> ${escH(name)}`;

      headerEl.innerHTML = `<p class="rv-game-title">${escH(name)}</p>`;

      renderSingleGame();
    }

    async function renderSingleGame() {
      if (!window.CottageDB) { root.innerHTML = '<p class="pr-empty">DB 연결 실패</p>'; return; }

      const reviews = await window.CottageDB.getGameReviews(GAME_ID);
      const user = window.getKakaoUser?.();

      const writeBox = user
        ? `<div class="rv-write-box">
            <textarea id="rvInput" placeholder="이 게임에 대한 후기를 남겨보세요." maxlength="500"></textarea>
            <div class="rv-write-actions">
              <button class="rv-submit-btn" id="rvSubmitBtn" type="button">등록</button>
            </div>
          </div>`
        : `<div class="rv-write-box" style="text-align:center;padding:12px 0">
            <button class="btn primary-btn" style="font-size:13px;padding:8px 18px;min-width:0" onclick="window.kakaoLogin?.()">카카오 로그인 후 후기를 남겨보세요</button>
          </div>`;

      const listHtml = reviews.length
        ? reviews.map(r => {
            const isMine = user && String(r.user_id) === String(user.id);
            return `<div class="rv-item" data-id="${r.id}">
              <div class="rv-head">
                <span class="rv-nick">${escH(r.nickname || '익명')}</span>
                <span style="display:flex;align-items:center">
                  <span class="rv-date">${formatDate(r.created_at)}</span>
                  ${isMine ? `<button class="rv-del" type="button">삭제</button>` : ''}
                </span>
              </div>
              <p class="rv-content">${escH(r.content)}</p>
            </div>`;
          }).join('')
        : `<p class="pr-empty">아직 후기가 없어요.<br>첫 번째 후기를 남겨보세요!</p>`;

      root.innerHTML = `${writeBox}<div class="rv-section-title">후기 ${reviews.length}건</div>${listHtml}`;

      const submitBtn = document.getElementById('rvSubmitBtn');
      if (submitBtn) {
        submitBtn.addEventListener('click', async () => {
          const input = document.getElementById('rvInput');
          const content = input?.value?.trim();
          if (!content) return;
          submitBtn.disabled = true;
          const res = await window.CottageDB.insertGameReview(GAME_ID, content, user?.nickname, user?.id);
          if (!res?.error) { input.value = ''; await renderSingleGame(); }
          else submitBtn.disabled = false;
        });
      }

      root.querySelectorAll('.rv-del').forEach(btn => {
        btn.addEventListener('click', async () => {
          const item = btn.closest('.rv-item');
          if (!confirm('삭제할까요?')) return;
          await window.CottageDB.deleteGameReview(item.dataset.id);
          item.remove();
        });
      });
    }

  })();
  </script>
