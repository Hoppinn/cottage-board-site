  // 폼 접기/펼치기
  (function () {
    const toggle = document.getElementById('introFormToggle');
    const body   = document.getElementById('introFormBody');
    const arrow  = document.getElementById('introFormArrow');
    let open = false;
    body.style.display = 'none';
    arrow.textContent  = '▸';

      body.style.display = open ? '' : 'none';
      arrow.textContent  = open ? '▾' : '▸';
    });
  })();

  <script>
  (function () {
    const cfg = window.SUPABASE_CONFIG;
    if (!cfg?.url || !window.supabase) return;
    if (!window._cottageSupabaseDb) window._cottageSupabaseDb = window.supabase.createClient(cfg.url, cfg.anonKey);
    const db = window._cottageSupabaseDb;

    const MY_KEY = 'cottage_my_intros';

    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const kst = new Date(d.getTime() + 9 * 3600000);
      return `${kst.getUTCFullYear()}.${String(kst.getUTCMonth()+1).padStart(2,'0')}.${String(kst.getUTCDate()).padStart(2,'0')}`;
    }

    function isAdmin() { return window.isOwner?.() || false; }
    function getCurrentUser() { return window.getKakaoUser?.() || null; }

    function getMyIds() {
      try { return JSON.parse(localStorage.getItem(MY_KEY) || '[]'); } catch { return []; }
    }
    function saveMyId(id) {
      const ids = getMyIds();
      if (!ids.includes(id)) { ids.push(id); localStorage.setItem(MY_KEY, JSON.stringify(ids)); }
    }
    function removeMyId(id) {
      localStorage.setItem(MY_KEY, JSON.stringify(getMyIds().filter(x => x !== id)));
    }

    function canDelete(r) {
      if (isAdmin()) return true;
      const u = getCurrentUser();
      if (u && r.user_id && String(r.user_id) === String(u.id)) return true;
      return getMyIds().includes(r.id);
    }

    async function deleteIntro(id) {
      if (!confirm('이 자기소개를 삭제할까요?')) return;
      const { error } = await db.from('member_intros').delete().eq('id', id);
      if (!error) {
        removeMyId(id);
        await loadIntros();
      }
    }

    function editIntro(id, r) {
      const cardEl = document.querySelector(`.intro-card-news[data-id="${id}"]`);
      if (!cardEl) return;
      cardEl.innerHTML = `
        <div class="intro-edit-form">
          <div class="intro-field">
            <label class="intro-label">닉네임 <span class="intro-required">*</span></label>
            <input class="intro-input" id="editNick_${id}" type="text" value="${escHtml(r.nickname)}" maxlength="20">
          </div>
          <div class="intro-field">
            <label class="intro-label">좋아하는 게임</label>
            <input class="intro-input" id="editGames_${id}" type="text" value="${escHtml(r.favorite_games || '')}" maxlength="100">
          </div>
          <div class="intro-field">
            <label class="intro-label">참여 가능 요일 / 시간</label>
            <input class="intro-input" id="editAvail_${id}" type="text" value="${escHtml(r.available || '')}" maxlength="100">
          </div>
          <div class="intro-field">
            <label class="intro-label">사시는 곳</label>
            <input class="intro-input" id="editLoc_${id}" type="text" value="${escHtml(r.location || '')}" maxlength="50">
          </div>
          <div class="intro-edit-btns">
            <button class="intro-edit-save-btn" type="button">저장</button>
            <button class="intro-edit-cancel-btn" type="button">취소</button>
          </div>
          <p class="intro-edit-msg"></p>
        </div>`;
      cardEl.querySelector('.intro-edit-cancel-btn').addEventListener('click', loadIntros);
      cardEl.querySelector('.intro-edit-save-btn').addEventListener('click', async () => {
        const nickname = cardEl.querySelector(`#editNick_${id}`).value.trim();
        const msg = cardEl.querySelector('.intro-edit-msg');
        if (!nickname) {
          msg.textContent = '닉네임을 입력해주세요.';
          msg.style.display = 'block';
          return;
        }
        const saveBtn = cardEl.querySelector('.intro-edit-save-btn');
        saveBtn.disabled = true;
        saveBtn.textContent = '저장 중...';
        const { error } = await db.from('member_intros').update({
          nickname,
          favorite_games: cardEl.querySelector(`#editGames_${id}`).value.trim() || null,
          available: cardEl.querySelector(`#editAvail_${id}`).value.trim() || null,
          location: cardEl.querySelector(`#editLoc_${id}`).value.trim() || null,
        }).eq('id', id);
        if (!error) {
          await loadIntros();
        } else {
          saveBtn.disabled = false;
          saveBtn.textContent = '저장';
          msg.textContent = '저장에 실패했어요. 다시 시도해주세요.';
          msg.style.display = 'block';
        }
      });
    }

    async function loadIntros() {
      const el = document.getElementById('introList');
      if (!getCurrentUser()) {
        el.innerHTML = '<p class="intro-list-empty" style="grid-column:1/-1;text-align:center;padding:32px 0">🔒 카카오 로그인 후 열람할 수 있습니다.</p>';
        return;
      }
      const { data, error } = await db
        .from('member_intros')
        .select('*')
        .order('created_at', { ascending: false });
      if (error || !data?.length) {
        el.innerHTML = '<p class="intro-list-empty" style="grid-column:1/-1">아직 인사가 없어요. 첫 번째로 남겨보세요!</p>';
        return;
      }
      el.innerHTML = data.map(r => {
        const canAct = canDelete(r);
        const del  = canAct ? `<button class="intro-card-del"  data-id="${r.id}" type="button" title="삭제">✕</button>` : '';
        const edit = canAct ? `<button class="intro-card-edit" data-id="${r.id}" type="button" title="수정">✎</button>` : '';
        return `
        <div class="intro-card-news" data-id="${r.id}">
          <div class="intro-card-news-head">
            ${edit}${del}
            <div class="intro-card-news-nickname">${escHtml(r.nickname)}</div>
            <div class="intro-card-news-date">${formatDate(r.created_at)}</div>
          </div>
          <div class="intro-card-news-body">
            ${r.favorite_games ? `<div class="intro-card-news-row"><span class="intro-card-news-label">🎲</span><span class="intro-card-news-val">${escHtml(r.favorite_games)}</span></div>` : ''}
            ${r.available ? `<div class="intro-card-news-row"><span class="intro-card-news-label">📅</span><span class="intro-card-news-val">${escHtml(r.available)}</span></div>` : ''}
            ${r.location ? `<div class="intro-card-news-row"><span class="intro-card-news-label">📍</span><span class="intro-card-news-val">${escHtml(r.location)}</span></div>` : ''}
          </div>
        </div>`;
      }).join('');

      el.querySelectorAll('.intro-card-del').forEach(btn => {
        btn.addEventListener('click', () => deleteIntro(btn.dataset.id));
      });
      el.querySelectorAll('.intro-card-edit').forEach(btn => {
        const id = btn.dataset.id;
        const r  = data.find(x => String(x.id) === String(id));
        btn.addEventListener('click', () => editIntro(id, r));
      });
    }

    document.getElementById('introSubmitBtn').addEventListener('click', async () => {
      const nickname = document.getElementById('introNickname').value.trim();
      const games    = document.getElementById('introGames').value.trim();
      const avail    = document.getElementById('introAvailable').value.trim();
      const loc      = document.getElementById('introLocation').value.trim();
      const msg      = document.getElementById('introSubmitMsg');

      if (!nickname) {
        msg.textContent = '닉네임을 입력해주세요.';
        msg.style.color = '#c0392b';
        msg.style.display = 'block';
        document.getElementById('introNickname').focus();
        return;
      }

      const btn = document.getElementById('introSubmitBtn');
      btn.disabled = true;
      btn.textContent = '등록 중...';

      const u = getCurrentUser();
      const { data: ins, error } = await db.from('member_intros').insert({
        nickname,
        favorite_games: games || null,
        available: avail || null,
        location: loc || null,
        user_id: u?.id ? String(u.id) : null,
      }).select('id');

      btn.disabled = false;
      btn.textContent = '인사 남기기';

      if (error) {
        msg.textContent = '오류가 발생했어요. 다시 시도해주세요.';
        msg.style.color = '#c0392b';
        msg.style.display = 'block';
        return;
      }

      if (ins?.[0]?.id) saveMyId(ins[0].id);

      ['introNickname','introGames','introAvailable','introLocation'].forEach(id => {
        document.getElementById(id).value = '';
      });
      msg.textContent = '인사를 남겼어요!';
      msg.style.color = 'var(--green)';
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 3000);
      await loadIntros();
    });

    ['introNickname','introGames','introAvailable','introLocation'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('introSubmitBtn').click();
      });
    });

    // 로그인/로그아웃 시 삭제 버튼 표시 여부 갱신
    window.addEventListener('cottage-auth-changed', loadIntros);

    loadIntros();
  })();
  </script>
